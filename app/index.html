<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Info Builder — manage your information stores." />
    <title>App — Info Builder</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <script defer src="/assets/js/main.js"></script>
    <script defer src="/assets/js/app.js"></script>
  </head>
  <body class="app-page">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="/" aria-label="Info Builder home">
          <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M6 16 L13 23 L26 9" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand__name">Info Builder</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/about/">About</a>
          <a href="/app/">App</a>
        </nav>
      </div>
    </header>

    <main id="main" class="app-main">
      <aside class="sidebar" id="sidebar" aria-label="Stores">
        <div class="sidebar__loading">Loading…</div>
      </aside>

      <div class="schema-editor" id="schema-content">
        <div class="empty-state">Loading…</div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p>&copy; <span data-year>2026</span> Info Builder.</p>
        <p><a href="https://github.com/gcameron00/infobuilder" rel="noopener">Source on GitHub</a></p>
      </div>
    </footer>
  </body>
</html>
